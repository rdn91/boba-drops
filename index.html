 <h1> What is Boba</h1>
 <p> Boba refers to the chewy tapioca pearls commonly found in bubble tea, a popular Taiwanese drink that combines tea, milk, and various flavorings. The term is often used interchangeably to describe the entire beverage itself. </p>
